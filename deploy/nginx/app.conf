# Nginx INTERNO da stack — só HTTP, numa porta local (127.0.0.1:APP_PORT).
# Unifica front + API + fotos num único upstream. O TLS/domínio fica no reverse
# proxy que já existe no seu servidor (ver deploy/README.md).
server {
    listen 80;
    server_name _;

    # Uploads de foto de encomenda
    client_max_body_size 20m;

    # API NestJS (mantém o prefixo /api)
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }

    # Fotos servidas pelo MinIO (bucket público). /fotos/<bucket>/<arquivo>
    location /fotos/ {
        proxy_pass http://minio:9000/;
        proxy_set_header Host $host;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
    }

    # Frontend (SPA)
    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
