# Serve a SPA Vite. O proxy TLS (deploy/) é quem termina HTTPS e roteia /api.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Não deixar o service worker nem o index em cache (para deploys aparecerem na hora)
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Assets com hash no nome → cache longo e imutável
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: qualquer rota do React cai no index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Healthcheck interno do container web
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok";
  }
}
