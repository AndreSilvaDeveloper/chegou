services:
  postgres:
    image: postgres:16-alpine
    container_name: portaria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: portaria
      POSTGRES_PASSWORD: portaria
      POSTGRES_DB: portaria_dev
    ports:
      - "5433:5432"
    volumes:
      - portaria_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portaria -d portaria_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: portaria-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - portaria_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:4
    container_name: portaria-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  minio:
    image: minio/minio:latest
    container_name: portaria-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: portaria
      MINIO_ROOT_PASSWORD: portaria123
    volumes:
      - portaria_miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: portaria-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 portaria portaria123 &&
      mc mb --ignore-existing local/portaria-fotos &&
      mc anonymous set download local/portaria-fotos
      "
    restart: "no"

volumes:
  portaria_pgdata:
  portaria_redisdata:
  portaria_miniodata:
