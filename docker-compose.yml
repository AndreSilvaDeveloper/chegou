# =============================================================================
# Chegou — stack de DESENVOLVIMENTO (tudo em Docker, com hot reload)
#
#   docker compose up            → sobe TUDO: banco, redis, minio, API e front
#   Front:   http://localhost:5173      (Vite + HMR)
#   API:     http://localhost:3000/api  (NestJS + nest watch)
#   Adminer: http://localhost:8081      (server: postgres · user/senha: portaria)
#   MinIO:   http://localhost:9001      (console · user/senha: portaria/portaria123)
#
# O código é montado por bind mount → salvar um arquivo recarrega sozinho.
# Só a infra (sem API/front): docker compose up postgres redis minio adminer
# Depois de mudar dependências (package.json): docker compose up -d --build
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: portaria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: portaria
      POSTGRES_PASSWORD: portaria
      POSTGRES_DB: portaria_dev
    ports:
      - "5433:5432"
    volumes:
      - portaria_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portaria -d portaria_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: portaria-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - portaria_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:4
    container_name: portaria-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  minio:
    image: minio/minio:latest
    container_name: portaria-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: portaria
      MINIO_ROOT_PASSWORD: portaria123
    volumes:
      - portaria_miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: portaria-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 portaria portaria123 &&
      mc mb --ignore-existing local/portaria-fotos &&
      mc anonymous set download local/portaria-fotos
      "
    restart: "no"

  # ---- Backend (NestJS) em modo dev, hot reload ----
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: portaria-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: "3000"
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://portaria:portaria@postgres:5432/portaria_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-nao-use-em-producao
      JWT_EXPIRES_IN: 12h
      BCRYPT_ROUNDS: "12"
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-twilio}
      WHATSAPP_FROM_NUMBER: ${WHATSAPP_FROM_NUMBER:-+14155238886}
      WHATSAPP_SANDBOX_MODE: "true"
      WHATSAPP_WEBHOOK_VERIFY: "false"
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: portaria-fotos
      STORAGE_REGION: us-east-1
      STORAGE_ACCESS_KEY: portaria
      STORAGE_SECRET_KEY: portaria123
      STORAGE_PUBLIC_URL: http://localhost:9000/portaria-fotos
      # hot reload em bind mount (necessário no Windows/macOS Docker)
      CHOKIDAR_USEPOLLING: "true"
      TSC_WATCHFILE: DynamicPriorityPolling
      TSC_WATCHDIRECTORY: DynamicPriorityPolling
    volumes:
      - .:/app
      - /app/node_modules   # mantém o node_modules do container (não o do host)
    command: sh -c "npm run db:migrate && npm run start:dev"

  # ---- Frontend (Vite) em modo dev, HMR ----
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: portaria-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://api:3000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  portaria_pgdata:
  portaria_redisdata:
  portaria_miniodata:
